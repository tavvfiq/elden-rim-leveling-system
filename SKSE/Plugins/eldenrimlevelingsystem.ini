; =============================================================================
; Elden Rim Leveling System — SKSE plugin configuration
; =============================================================================
;
; Location (required):
;   Data/SKSE/Plugins/<DLL_stem>.ini
;   Example: eldenrimlevelingsystem.dll → eldenrimlevelingsystem.ini
;
; Reload:
;   Values are read once at plugin load. Change INI → restart the game.
;
; Syntax:
;   - Lines starting with ; or # are comments.
;   - Section names: [EquipLoad], [Tuning] (case-insensitive).
;   - Keys are case-insensitive. Use = with no spaces required around it.
;
; Code reference: skse_code/src/Config.cpp (parsed keys), skse_code/src/Config.h (getters).
; Packaging notes: skse_code/README_SKSE.md
;
; =============================================================================

[EquipLoad]
; Fractions of ER_EQUIPLOAD_MAX_AVG (published from computed CarryWeight / equip-load proxy).
; ERCF (or other mods) compare current equipped weight to these thresholds for roll / move tiers.
;
; Rules enforced by the plugin:
;   - Each fraction is clamped to [0.01, 1.0].
;   - MediumFraction must be greater than LightFraction; otherwise defaults 0.30 / 0.70 are used.
;
; Alternate key names (same meaning): Light = LightFraction, Medium = MediumFraction.

LightFraction = 0.30
MediumFraction = 0.70

; ER_EQUIPLOAD_HEAVY_AVG is always max (1.00 × max) in code; no INI key yet.

[Tuning]
; If true, hooks Actor::GetLevel and returns ER level for player only.
; This affects quest/player level checks without mutating vanilla player level data.
OverridePlayerGetLevel = true

; If true, blocks vanilla skill XP gain and vanilla level advancement.
; ER progression remains controlled by this plugin's own stat system.
DisableVanillaXPGain = true

; If true, enemies killed by the player auto-drop gold using gold_kill_formula.md.
EnableGoldKillDrops = true

; If true, ER level gains grant the same number of vanilla perk points (delta-based sync).
; This keeps perk-gated systems (smithing/enchanting/alchemy perks) usable without vanilla XP leveling.
EnablePerkPointParity = true

; If true, grants configured vanilla perks automatically when ER level reaches thresholds.
; Config file: Data/SKSE/Plugins/eldenrimlevelingsystem_perk_unlocks.json
EnablePerkAutoUnlock = true